services:
  # Node.js Express Backend Service
  - type: web
    name: podcast-planner-backend
    runtime: node
    buildCommand: pnpm install
    startCommand: pnpm --filter podcast-planner-backend start
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # React Static Frontend
  - type: web
    name: podcast-planner-frontend
    runtime: static
    buildCommand: pnpm --filter podcast-planner-frontend run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_API_URL
        fromService:
          type: web
          name: podcast-planner-backend
          property: host
