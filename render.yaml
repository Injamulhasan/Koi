services:
  - type: web
    name: koi-hangout-hub
    env: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm --filter @workspace/db run push && node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: koi-db
          property: connectionString

databases:
  - name: koi-db
    plan: free
